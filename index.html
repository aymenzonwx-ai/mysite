<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Ultimate Tremix Bot ⚡</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(45deg,#000814,#001d3d,#000814);
    background-size:400% 400%;
    animation:bgMove 10s infinite alternate;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

@keyframes bgMove{
    0%{background-position:0% 50%}
    100%{background-position:100% 50%}
}

.chat-container{
    width:400px;
    height:620px;
    background:#001d3d;
    border-radius:20px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    box-shadow:0 0 30px #00f5ff;
    transition:0.3s;
}

.chat-header{
    background:#00f5ff;
    padding:15px;
    text-align:center;
    font-weight:bold;
    color:black;
}

.chat-messages{
    flex:1;
    padding:15px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.message{
    padding:10px 14px;
    border-radius:15px;
    max-width:75%;
    font-size:14px;
    animation:fadeIn 0.4s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(10px);}
    to{opacity:1; transform:translateY(0);}
}

.user{
    align-self:flex-end;
    background:#00f5ff;
    color:black;
    box-shadow:0 0 10px #00f5ff;
}

.bot{
    align-self:flex-start;
    background:#003566;
    color:white;
    box-shadow:0 0 10px #00f5ff;
}

.red{
    color:#ff0000;
    font-weight:bold;
    text-shadow:0 0 10px red;
}

.fire{
    color:orange;
    text-shadow:0 0 10px orange,0 0 20px red;
}

.typing{
    font-style:italic;
    opacity:0.7;
}

.chat-input{
    display:flex;
    padding:10px;
    background:#000814;
}

.chat-input input{
    flex:1;
    padding:10px;
    border:none;
    border-radius:15px;
    outline:none;
}

.chat-input button{
    margin-left:5px;
    padding:10px;
    border:none;
    border-radius:15px;
    background:#00f5ff;
    font-weight:bold;
    cursor:pointer;
}

.control-buttons{
    display:flex;
    justify-content:space-between;
    padding:5px;
    background:#000814;
}

.control-buttons button{
    flex:1;
    margin:3px;
    padding:5px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="chat-container">
    <div class="chat-header">⚡ Ultimate Tremix Bot ⚡</div>

    <div class="chat-messages" id="messages"></div>

    <div class="chat-input">
        <input type="text" id="userInput" placeholder="اكتب أمر...">
        <button onclick="sendMessage()">إرسال</button>
    </div>

    <div class="control-buttons">
        <button onclick="clearChat()">🗑 مسح</button>
        <button onclick="toggleTheme()">🌙 وضع</button>
    </div>
</div>

<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>

function sendMessage(){
    const input = document.getElementById("userInput");
    const text = input.value.trim();
    if(text === "") return;

    addMessage(text,"user");
    input.value="";
    playSound();

    setTimeout(()=> handleBotReply(text),1000);
}

function addMessage(text,type,extra=""){
    const msg=document.createElement("div");
    msg.className="message "+type+" "+extra;
    msg.innerText=text;
    document.getElementById("messages").appendChild(msg);
    document.getElementById("messages").scrollTop=999999;
}

function playSound(){
    document.getElementById("sound").play();
}

function fakeTyping(callback){
    addMessage("⚡ جاري المعالجة...","bot","typing");
    setTimeout(()=>{
        const typing=document.querySelector(".typing");
        if(typing) typing.remove();
        callback();
    },1200);
}

function shake(){
    const box=document.querySelector(".chat-container");
    box.style.transform="translateX(6px)";
    setTimeout(()=> box.style.transform="translateX(-6px)",100);
    setTimeout(()=> box.style.transform="translateX(0)",200);
}

function glitch(text){
    return text.split("").map(c=>c+String.fromCharCode(768)).join("");
}

function handleBotReply(msg){

    fakeTyping(()=>{

        if(msg==="/help"){
            addMessage("⚡ قائمة الأوامر ⚡","bot");
            addMessage("/df","bot");
            addMessage("/cf","bot");
            addMessage("/Bn","bot");
            addMessage("/OP","bot");
            addMessage("/a","bot");
        }

        else if(msg==="/df"){
            addMessage("⚡ تم التنفيذ بنجاح","bot","fire");
        }

        else if(msg==="/cf"){
            let i=0;
            let spam=setInterval(()=>{
                addMessage("1112121313158184","bot");
                i++;
                if(i>=5) clearInterval(spam);
            },400);
        }

        else if(msg==="/Bn"){
            shake();
            addMessage(glitch("BLACK STORM"),"bot","red");
        }

        else if(msg==="/OP"){
            addMessage("ايمن زعرور ✅🥳","bot");
        }

        else if(msg==="/a"){
            addMessage("👤 معلومات الحساب","bot","fire");
            setTimeout(()=> addMessage("الاسم: ايمن","bot"),400);
            setTimeout(()=> addMessage("اللقب: زعرور","bot"),800);
            setTimeout(()=> addMessage("البلد: الجزائر 🇩🇿","bot"),1200);
            setTimeout(()=> addMessage("المدينة: جيجل","bot"),1600);
            setTimeout(()=> addMessage("العمر: 16 سنة 🎂","bot"),2000);
            setTimeout(()=> addMessage("مرحبا ايمن زعرور ✅🥳","bot"),2400);
        }

        else{
            addMessage("اكتب /help","bot");
        }

    });
}

function clearChat(){
    document.getElementById("messages").innerHTML="";
}

function toggleTheme(){
    const box=document.querySelector(".chat-container");
    if(box.style.background==="white"){
        box.style.background="#001d3d";
        box.style.color="white";
    }else{
        box.style.background="white";
        box.style.color="black";
    }
}

</script>

</body>
</html>
