<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dz News Pro</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#f4f4f4;
    direction:rtl;
}

header{
    background:#d32f2f;
    color:white;
    padding:15px;
    text-align:center;
}

.container{
    padding:20px;
}

.news{
    background:white;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
    position:relative;
}

.news img{
    max-width:100%;
    border-radius:10px;
    margin-top:10px;
}

.menu-btn{
    position:absolute;
    left:10px;
    top:10px;
    cursor:pointer;
    font-size:20px;
}

.dropdown{
    display:none;
    position:absolute;
    left:10px;
    top:35px;
    background:white;
    border:1px solid #ddd;
    border-radius:5px;
    z-index:10;
}

.dropdown button{
    display:block;
    border:none;
    background:none;
    padding:8px;
    cursor:pointer;
    width:100%;
}

#addBtn{
    position:fixed;
    bottom:20px;
    left:20px;
    background:#d32f2f;
    color:white;
    border:none;
    padding:15px;
    border-radius:50%;
    font-size:20px;
    cursor:pointer;
}

.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    padding:20px;
    width:90%;
    max-width:400px;
    border-radius:10px;
}

.modal input, .modal textarea{
    width:100%;
    margin-bottom:10px;
    padding:8px;
}
</style>
</head>
<body>

<header>
<h1>📰 Dz News Pro</h1>
</header>

<div class="container" id="newsContainer"></div>

<button id="addBtn">+</button>

<div class="modal" id="modal">
<div class="modal-content">
<h3>نشر خبر جديد</h3>
<input type="text" id="title" placeholder="عنوان الخبر">
<textarea id="content" placeholder="محتوى الخبر"></textarea>
<input type="file" id="image">
<button onclick="addNews()">نشر</button>
<button onclick="closeModal()">إلغاء</button>
</div>
</div>

<script>
const modal = document.getElementById("modal");
const container = document.getElementById("newsContainer");
let controlOpen = false;

document.getElementById("addBtn").onclick = () => {
    modal.style.display = "flex";
}

function closeModal(){
    modal.style.display="none";
}

function addNews(){
    const title = document.getElementById("title").value;
    const content = document.getElementById("content").value;
    const imageInput = document.getElementById("image");
    const file = imageInput.files[0];

    const newsDiv = document.createElement("div");
    newsDiv.className="news";

    let imgHTML = "";
    if(file){
        const reader = new FileReader();
        reader.onload = function(e){
            imgHTML = `<img src="${e.target.result}">`;
            newsDiv.innerHTML = createNewsHTML(title, content, imgHTML);
        }
        reader.readAsDataURL(file);
    }else{
        newsDiv.innerHTML = createNewsHTML(title, content, imgHTML);
    }

    container.prepend(newsDiv);
    closeModal();
}

function createNewsHTML(title, content, img){
    return `
        <span class="menu-btn" onclick="toggleMenu(this)">⋮</span>
        <div class="dropdown">
            <button onclick="deleteNews(this)">حذف</button>
            <button onclick="closeControl(this)">إغلاق لوحة التحكم</button>
        </div>
        <h2>${title}</h2>
        <p>${content}</p>
        ${img}
    `;
}

function toggleMenu(btn){
    if(!controlOpen){
        let pass = prompt("أدخل كلمة السر:");
        if(pass !== "1"){
            alert("كلمة السر خاطئة ❌");
            return;
        }
        controlOpen = true;
    }
    const dropdown = btn.nextElementSibling;
    dropdown.style.display = dropdown.style.display === "block" ? "none" : "block";
}

function deleteNews(btn){
    btn.closest(".news").remove();
}

function closeControl(btn){
    controlOpen = false;
    document.querySelectorAll(".dropdown").forEach(d => d.style.display="none");
    alert("تم إغلاق لوحة التحكم 🔒");
}
</script>

</body>
</html>
