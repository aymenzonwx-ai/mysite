<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reels Rewards</title>

<style>
body{
    margin:0;
    background:#1e1e2f;
    font-family:Arial;
    overflow:hidden;
    color:white;
}

.container{
    position:relative;
    height:100vh;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
}

.video-box{
    position:relative;
    height:100vh;
    scroll-snap-align:start;
}

video{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* معلومات فوق الفيديو */
.overlay{
    position:absolute;
    bottom:80px;
    left:15px;
}

.overlay h3{
    margin:0;
}

.overlay p{
    font-size:14px;
    opacity:0.8;
}

/* أزرار جانبية */
.side-buttons{
    position:absolute;
    right:10px;
    bottom:100px;
    text-align:center;
}

.side-buttons div{
    margin:15px 0;
    cursor:pointer;
}

/* النقاط */
.points{
    position:fixed;
    top:10px;
    right:10px;
    background:#ff0050;
    padding:8px 15px;
    border-radius:20px;
    font-weight:bold;
    z-index:10;
}

/* شريط سفلي */
.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:black;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
    border-top:1px solid #333;
}

.bottom-nav div{
    text-align:center;
    font-size:12px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="points">⭐ <span id="points">0</span></div>

<div class="container">

<div class="video-box">
<video src="https://www.w3schools.com/html/mov_bbb.mp4" autoplay muted loop></video>

<div class="overlay">
<h3>@company_name</h3>
<p>شاهد الفيديو كامل لتحصل على 5 نقاط</p>
</div>

<div class="side-buttons">
<div onclick="like()">❤️<br><span id="likes">0</span></div>
<div onclick="claim()">💰</div>
</div>

</div>

<div class="video-box">
<video src="https://www.w3schools.com/html/movie.mp4" autoplay muted loop></video>

<div class="overlay">
<h3>@ads_video</h3>
<p>شاهد الفيديو لتحصل على نقاط</p>
</div>

<div class="side-buttons">
<div onclick="like()">❤️<br><span id="likes2">0</span></div>
<div onclick="claim()">💰</div>
</div>

</div>

</div>

<div class="bottom-nav">
<div>🏠<br>Home</div>
<div onclick="convert()">💱<br>Exchange</div>
<div>🔍<br>Search</div>
<div>👤<br>Profile</div>
</div>

<script>
let points = localStorage.getItem("points") || 0;
points = parseInt(points);
document.getElementById("points").innerText = points;

function claim(){
    points += 5;
    localStorage.setItem("points",points);
    document.getElementById("points").innerText = points;
    alert("تم إضافة 5 نقاط");
}

function convert(){
    if(points >= 1000){
        points -= 1000;
        localStorage.setItem("points",points);
        document.getElementById("points").innerText = points;
        alert("تم تحويل 1000 نقطة إلى 10$ (رصيد تجريبي)");
    } else {
        alert("تحتاج 1000 نقطة للتحويل");
    }
}

let likeCount = 0;
function like(){
    likeCount++;
    document.querySelectorAll("#likes,#likes2").forEach(el=>{
        el.innerText = likeCount;
    });
}
</script>

</body>
</html>
